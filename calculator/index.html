<!DOCTYPE html>
<html>
  <head>
    <!-- <script>window.$ = window.jQuery = require('./jquery-3.4.1.min.js');</script> -->
    <script type="text/javascript" src="./jquery.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator App</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <!-- 4x5 grid-->
    <div class="buttons">
      <div class="resContainer">
        <div class="result"></div>
        <div class="output"></div>
      </div>
      <div class="btn unselectable" id="c">C</div>
      <div class="btn unselectable" id="ce">CE</div>
      <div class="btn unselectable" id="memory">
        <div class="save">M</div>
        <div class="load">MR</div>
      </div>
      
      <div class="btn unselectable sep opr" id="div">÷</div>
      <div class="btn unselectable num" id="7">7</div>
      <div class="btn unselectable num" id="8">8</div>
      <div class="btn unselectable num" id="9">9</div>
      <div class="btn unselectable sep opr" id="mlt">×</div>
      <div class="btn unselectable num" id="4">4</div>
      <div class="btn unselectable num" id="5">5</div>
      <div class="btn unselectable num" id="6">6</div>
      <div class="btn unselectable sep opr" id="sub">-</div>
      <div class="btn unselectable num" id="1">1</div>
      <div class="btn unselectable num" id="2">2</div>
      <div class="btn unselectable num" id="3">3</div>
      <div class="btn unselectable sep opr" id="add">+</div>
      <div class="btn unselectable num" id="0">0</div>
      <div class="btn unselectable num" id="point">.</div>
      <div class="btn unselectable sep" id="flip">WIP<!-- -/+ --></div>
      <div class="btn unselectable" id="submit">=</div>
      <!-- <script type="text/javascript" src="/node_modules/jquery/dist/jquery.min.js"></script> -->
      <script src="script.js"></script>
    </div>
  </body>
</html>
